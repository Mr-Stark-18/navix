<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SPEQULA | AI-native sourcing from South East Asia</title>
<meta name="description" content="SPEQULA is an AI-native sourcing and supply chain platform. AI matches you with vetted manufacturers across South East Asia and runs procurement end to end, covering production tracking, quality KPIs, compliance, logistics and financing." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#ffffff;
    --surface:#f6f8fd;
    --surface-2:#eef1fb;
    --panel:#ffffff;
    --navy-ink:#0a0e1a;
    --ink-soft:#48506a;
    --ink-faint:#79829c;
    --blue:#1E3DFF;
    --blue-deep:#1730c9;
    --blue-tint:rgba(30,61,255,.10);
    --emerald:#1E3DFF;
    --emerald-deep:#1E3DFF;
    --emerald-tint:rgba(30,61,255,.10);
    --line:rgba(10,14,26,.10);
    --line-strong:rgba(10,14,26,.16);
    --shadow-sm:0 1px 2px rgba(16,24,64,.08), 0 1px 1px rgba(16,24,64,.05);
    --shadow-md:0 18px 40px -18px rgba(16,24,64,.20), 0 4px 12px -6px rgba(16,24,64,.12);
    --shadow-lg:0 40px 90px -34px rgba(16,24,64,.26);
    --radius:16px;
    --radius-sm:11px;
    --maxw:1160px;
    --display:"Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
    --body:"Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth; -webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--paper); color:var(--navy-ink);
    font-family:var(--body); font-size:16.5px; line-height:1.65;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(820px 520px at 88% -4%, rgba(30,61,255,.07), transparent 68%),
      radial-gradient(680px 480px at -6% 30%, rgba(30,61,255,.05), transparent 66%);
  }
  a{color:inherit; text-decoration:none}
  img,svg{display:block; max-width:100%}
  ::selection{background:var(--blue); color:#ffffff}
  .wrap{width:100%; max-width:var(--maxw); margin:0 auto; padding:0 24px}

  .eyebrow{
    font-family:var(--body); font-size:.78rem; font-weight:600;
    letter-spacing:.14em; text-transform:uppercase; color:var(--blue);
    display:inline-flex; align-items:center; gap:.6rem;
  }
  .eyebrow::before{content:""; width:20px; height:2px; background:var(--blue); display:inline-block; border-radius:2px}

  h1,h2,h3,h4{font-family:var(--display); font-weight:700; line-height:1.12; letter-spacing:-.02em; margin:0; color:var(--navy-ink)}
  p{margin:0}

  .btn{
    font-family:var(--display); font-weight:600; font-size:.96rem; border:0; cursor:pointer;
    border-radius:11px; padding:.82rem 1.3rem; display:inline-flex; align-items:center; gap:.5rem;
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease, color .18s ease, border-color .18s ease; white-space:nowrap;
  }
  .btn-primary{background:var(--blue); color:#ffffff; box-shadow:var(--shadow-sm)}
  .btn-primary:hover{background:var(--blue-deep); color:#fff; transform:translateY(-1px); box-shadow:var(--shadow-md)}
  .btn-ghost{background:#ffffff; color:var(--navy-ink); border:1px solid var(--line-strong)}
  .btn-ghost:hover{border-color:var(--blue); color:var(--blue); transform:translateY(-1px)}
  .btn .arr{transition:transform .18s ease}
  .btn:hover .arr{transform:translateX(3px)}

  /* NAV */
  .nav{position:sticky; top:0; z-index:50; background:rgba(255,255,255,.78);
    backdrop-filter:saturate(160%) blur(14px); -webkit-backdrop-filter:saturate(160%) blur(14px);
    border-bottom:1px solid transparent; transition:border-color .25s ease, box-shadow .25s ease}
  .nav.scrolled{border-bottom-color:var(--line); box-shadow:0 1px 0 rgba(10,14,26,.06), var(--shadow-sm)}
  .nav-inner{display:flex; align-items:center; justify-content:space-between; height:74px}
  .brand-chip{background:transparent; border-radius:11px; padding:0; display:inline-flex}
  .brand-logo{height:30px; width:auto; display:block}
  .nav-links{display:flex; align-items:center; gap:2rem; list-style:none; margin:0; padding:0}
  .nav-links a{font-size:.95rem; font-weight:500; color:var(--ink-soft); transition:color .18s ease}
  .nav-links a:hover{color:var(--navy-ink)}
  .nav-cta{display:flex; align-items:center; gap:.75rem}
  .nav-toggle{display:none; background:#ffffff; border:1px solid var(--line-strong); border-radius:9px; width:44px; height:40px; cursor:pointer; padding:0}
  .nav-toggle span{display:block; width:18px; height:2px; background:var(--navy-ink); margin:3px auto; border-radius:2px; transition:.25s}
  .nav-toggle.open span:nth-child(1){transform:translateY(5px) rotate(45deg)}
  .nav-toggle.open span:nth-child(2){opacity:0}
  .nav-toggle.open span:nth-child(3){transform:translateY(-5px) rotate(-45deg)}
  .mobile-menu{display:none; border-top:1px solid var(--line); background:rgba(255,255,255,.97); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px)}
  .mobile-menu.open{display:block}
  .mobile-menu a{display:block; padding:1rem 24px; font-weight:500; color:var(--ink-soft); border-bottom:1px solid var(--line)}
  .mobile-menu .btn{margin:16px 24px; width:calc(100% - 48px); justify-content:center}

  /* HERO */
  .hero{position:relative; padding:78px 0 90px; overflow:hidden}
  .hero::before{content:""; position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(640px 380px at 86% -6%, rgba(30,61,255,.09), transparent 70%),
      radial-gradient(520px 320px at 2% 108%, rgba(30,61,255,.06), transparent 70%);}
  .hero-grid{display:grid; grid-template-columns:1.06fr .94fr; gap:54px; align-items:center; position:relative}
  .hero h1{font-size:clamp(2.6rem, 5.6vw, 4.5rem); font-weight:800; letter-spacing:-.03em; margin:22px 0 0}
  .hero h1 .ai{
    color:var(--blue);
  }
  .hero-sub{margin-top:22px; font-size:1.14rem; color:var(--ink-soft); max-width:46ch}
  .hero-sub-2{margin-top:16px}
  .hero-actions{margin-top:30px; display:flex; gap:14px; flex-wrap:wrap}
  .hero-focus{margin-top:30px; display:inline-flex; align-items:center; gap:.7rem; font-size:.9rem; color:var(--ink-soft);
    background:var(--surface-2); border:1px solid var(--line); border-radius:999px; padding:.5rem .95rem; box-shadow:var(--shadow-sm)}
  .hero-focus b{color:var(--navy-ink); font-weight:600}
  .hero-focus .pip{width:8px; height:8px; border-radius:50%; background:var(--emerald)}

  /* Hero network visual (no data) */
  .netwrap{position:relative; background:linear-gradient(180deg,var(--panel), var(--surface));
    border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow-lg); padding:20px 16px; aspect-ratio:1.18/1}
  .netwrap svg{width:100%; height:100%}
  .net-label{font-family:var(--display); font-weight:600; font-size:15px; fill:var(--navy-ink)}
  .net-cap{font-family:var(--body); font-weight:500; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; fill:var(--ink-faint)}
  .net-line{stroke:var(--line-strong); stroke-width:1.6; fill:none}
  .net-flow{stroke:var(--blue); stroke-width:2; fill:none; stroke-linecap:round; stroke-dasharray:5 12; opacity:.9}
  .net-node{fill:var(--panel); stroke:var(--blue); stroke-width:2.2}
  .net-node-pulse{fill:var(--blue); opacity:.20}
  .net-hub{fill:var(--emerald)}
  .net-hub-ring{fill:none; stroke:var(--emerald); stroke-width:2.4; opacity:.5}
  .net-globe{fill:none; stroke:var(--line-strong); stroke-width:1.4; opacity:.6}
  @keyframes flow{to{stroke-dashoffset:-34}}
  @keyframes breathe{0%,100%{transform:scale(1); opacity:.16}50%{transform:scale(1.6); opacity:0}}
  @keyframes hubring{0%,100%{transform:scale(1); opacity:.45}50%{transform:scale(1.18); opacity:0}}
  .flowA{animation:flow 1.6s linear infinite}
  .flowB{animation:flow 2.2s linear infinite}
  .flowC{animation:flow 1.9s linear infinite}
  .pulse{transform-box:fill-box; transform-origin:center; animation:breathe 3s ease-in-out infinite}
  .pulse.d1{animation-delay:.6s}.pulse.d2{animation-delay:1.2s}.pulse.d3{animation-delay:1.8s}.pulse.d4{animation-delay:2.4s}
  .hubring{transform-box:fill-box; transform-origin:center; animation:hubring 2.8s ease-out infinite}

  /* SECTIONS */
  .section{padding:96px 0}
  .section.tint{background:var(--surface); border-top:1px solid var(--line); border-bottom:1px solid var(--line)}
  .section-head{max-width:660px}
  .section-head h2{font-size:clamp(2rem,3.7vw,2.95rem); font-weight:800; margin-top:16px}
  .section-head p{margin-top:16px; color:var(--ink-soft); font-size:1.08rem}

  /* PROCESS (end-to-end) */
  .steps{display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-top:50px; position:relative}
  .step{position:relative; padding-top:30px}
  .step .sn{font-family:var(--display); font-weight:700; font-size:.82rem; color:var(--blue);
    width:34px; height:34px; border-radius:9px; background:var(--blue-tint); display:grid; place-items:center; margin-bottom:16px}
  .step h3{font-size:1.12rem; margin-bottom:8px}
  .step p{color:var(--ink-soft); font-size:.95rem}
  .step::before{content:""; position:absolute; top:46px; left:46px; right:-20px; height:2px;
    background:linear-gradient(90deg,var(--line-strong), transparent); }
  .step:last-child::before{display:none}

  /* FEATURES */
  .feat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px; margin-top:50px}
  .feat-grid-4{grid-template-columns:repeat(4,1fr); gap:20px}
  .feat{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:30px 28px;
    transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease}
  .feat:hover{transform:translateY(-4px); box-shadow:var(--shadow-md); border-color:var(--line-strong)}
  .feat .ficon{width:54px; height:54px; border-radius:14px; display:grid; place-items:center; margin-bottom:20px}
  .feat .ficon svg{width:27px; height:27px}
  .feat .ficon.blue{background:var(--blue-tint); color:var(--blue)}
  .feat .ficon.green{background:var(--emerald-tint); color:var(--emerald-deep)}
  .feat h3{font-size:1.2rem; margin-bottom:10px}
  .feat p{color:var(--ink-soft); font-size:.97rem}
  .feat-title{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px}
  .feat-title h3{margin-bottom:0}
  .soon{font-family:var(--body); font-size:.66rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
    color:var(--emerald-deep); background:var(--emerald-tint); padding:.26rem .58rem; border-radius:999px; white-space:nowrap}

  /* CONTACT */
  .contact-grid{display:grid; grid-template-columns:1fr 1fr; gap:54px; align-items:center}
  .contact-card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:8px; box-shadow:var(--shadow-md)}
  .contact-row{display:flex; align-items:center; gap:16px; padding:20px; border-radius:12px; transition:background .18s ease}
  .contact-row:hover{background:var(--surface-2)}
  .contact-row + .contact-row{border-top:1px solid var(--line)}
  .contact-row .cicon{width:48px; height:48px; border-radius:12px; background:var(--blue-tint); color:var(--blue); display:grid; place-items:center; flex:none}
  .contact-row .cicon svg{width:23px; height:23px}
  .contact-row .ck{font-size:.72rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint)}
  .contact-row .cv{font-weight:600; font-size:1.04rem; margin-top:3px; word-break:break-word; font-family:var(--display)}
  .contact-row .cn{font-size:.85rem; color:var(--ink-soft)}
  .contact-cta h2{font-size:clamp(1.9rem,3.4vw,2.7rem); font-weight:800}
  .contact-cta p{color:var(--ink-soft); margin-top:14px; font-size:1.06rem; max-width:40ch}
  .contact-cta .btn{margin-top:24px}

  /* TRUST / WHY PARTNER */
  .trust-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:22px; margin-top:50px}
  .trust{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:28px 24px;
    transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease}
  .trust:hover{transform:translateY(-4px); box-shadow:var(--shadow-md); border-color:var(--line-strong)}
  .trust .ticon{width:50px; height:50px; border-radius:13px; display:grid; place-items:center; margin-bottom:18px; background:var(--blue-tint); color:var(--blue)}
  .trust:nth-child(even) .ticon{background:var(--emerald-tint); color:var(--emerald-deep)}
  .trust .ticon svg{width:25px; height:25px}
  .trust h3{font-size:1.08rem; margin-bottom:8px}
  .trust p{color:var(--ink-soft); font-size:.93rem}

  .founders{margin-top:58px; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius);
    padding:38px 40px; display:flex; flex-direction:column; gap:18px}
  .founders-head{font-family:var(--body); font-size:.78rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--emerald-deep)}
  .founders-names{display:flex; gap:38px; flex-wrap:wrap}
  .founder .fn{font-family:var(--display); font-weight:700; font-size:1.18rem; letter-spacing:-.01em}
  .founder .fm{font-size:.9rem; color:var(--ink-soft); margin-top:3px}
  .founders-line{color:var(--ink-soft); font-size:1rem; max-width:60ch}

  /* FOOTER */
  .footer{background:#0a0e1a; color:rgba(255,255,255,.72); padding:60px 0 30px; border-top:1px solid var(--line)}
  .footer-grid{display:grid; grid-template-columns:1.7fr 1fr 1fr; gap:40px}
  .footer-logo-chip{background:#ffffff; border-radius:12px; padding:12px 16px; display:inline-block; box-shadow:0 8px 24px -10px rgba(0,0,0,.55)}
  .footer-logo-chip img{height:30px; width:auto; display:block}
  .footer-about{color:rgba(255,255,255,.55); font-size:.95rem; max-width:38ch; margin-top:18px}
  .footer h5{font-family:var(--display); font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.50); margin:0 0 16px; font-weight:600}
  .footer ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:11px}
  .footer ul a{color:rgba(255,255,255,.72); font-size:.93rem; transition:color .18s ease}
  .footer ul a:hover{color:#ffffff}
  .footer-bottom{margin-top:46px; padding-top:24px; border-top:1px solid rgba(255,255,255,.12); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; font-size:.85rem; color:rgba(255,255,255,.45)}

  .reveal{opacity:0; transform:translateY(22px); transition:opacity .7s cubic-bezier(.22,1,.36,1), transform .7s cubic-bezier(.22,1,.36,1)}
  .reveal.in{opacity:1; transform:none}

  @media (max-width:980px){
    .hero{padding:48px 0 64px}
    .hero-grid{grid-template-columns:1fr; gap:44px}
    .steps{grid-template-columns:1fr 1fr; gap:28px}
    .step::before{display:none}
    .feat-grid{grid-template-columns:1fr 1fr}
    .feat-grid-4{grid-template-columns:1fr 1fr}
    .cat-grid{grid-template-columns:repeat(2,1fr)}
    .trust-grid{grid-template-columns:1fr 1fr}
    .founders{padding:30px 26px}
    .founders-names{gap:26px}
    .contact-grid{grid-template-columns:1fr; gap:34px}
    .footer-grid{grid-template-columns:1fr 1fr; gap:30px}
    .nav-links{display:none}
    .nav .nav-cta .btn-ghost{display:none}
    .nav-toggle{display:block}
  }
  @media (max-width:560px){
    .wrap{padding:0 18px}
    .section{padding:64px 0}
    .steps{grid-template-columns:1fr}
    .feat-grid{grid-template-columns:1fr; gap:16px}
    .feat-grid-4{grid-template-columns:1fr; gap:16px}
    .cat-grid{grid-template-columns:1fr 1fr; gap:12px}
    .trust-grid{grid-template-columns:1fr; gap:14px}
    .footer-grid{grid-template-columns:1fr}
    .mobile-menu .btn{width:calc(100% - 36px); margin:16px 18px}
    .mobile-menu a{padding:1rem 18px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important; transition:none !important; scroll-behavior:auto !important}
    .reveal{opacity:1; transform:none}
  }
</style>
</head>
<body id="top">

<script>
(function(){
  "use strict";
  document.getElementById('year').textContent = new Date().getFullYear();

  var nav = document.getElementById('nav');
  var onScroll = function(){ nav.classList.toggle('scrolled', window.scrollY > 8); };
  onScroll(); window.addEventListener('scroll', onScroll, {passive:true});

  var toggle = document.getElementById('navToggle');
  var menu = document.getElementById('mobileMenu');
  toggle.addEventListener('click', function(){
    var open = menu.classList.toggle('open');
    toggle.classList.toggle('open', open);
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    toggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
  });
  menu.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){
      menu.classList.remove('open'); toggle.classList.remove('open');
      toggle.setAttribute('aria-expanded','false');
    });
  });

  var reveals = document.querySelectorAll('.reveal');
  if ('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
    }, {threshold:0.12, rootMargin:'0px 0px -40px 0px'});
    reveals.forEach(function(el){ io.observe(el); });
  } else { reveals.forEach(function(el){ el.classList.add('in'); }); }
})();
</script>
</body>
</html>
